name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install and build 🔧
        env:
          VITE_PIXABAY_API_KEY: ${{ secrets.VITE_PIXABAY_API_KEY }}
        run: |
          npm ci

          if [ -z "$VITE_PIXABAY_API_KEY" ]; then
            echo "❌ VITE_PIXABAY_API_KEY is empty"
            exit 1
          else
            echo "✅ VITE_PIXABAY_API_KEY is set"
          fi

          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist