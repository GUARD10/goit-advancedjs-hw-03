name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate secret
        env:
          VITE_PIXABAY_API_KEY: ${{ secrets.VITE_PIXABAY_API_KEY }}
        run: |
          if [ -z "$VITE_PIXABAY_API_KEY" ]; then
            echo "VITE_PIXABAY_API_KEY is empty or not available"
            exit 1
          fi

          echo "VITE_PIXABAY_API_KEY is available"

      - name: Build
        env:
          VITE_PIXABAY_API_KEY: ${{ secrets.VITE_PIXABAY_API_KEY }}
        run: npm run build

      - name: Verify build output
        env:
          VITE_PIXABAY_API_KEY: ${{ secrets.VITE_PIXABAY_API_KEY }}
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "dist/index.html does not exist"
            exit 1
          fi

          if [ -f "dist/index.js" ]; then
            echo "dist/index.js exists. This will be cached. Use hashed JS filenames."
            exit 1
          fi

          if ! find dist/assets -name "index-*.js" | grep -q .; then
            echo "Hashed index JS file was not found."
            find dist -maxdepth 3 -type f -print
            exit 1
          fi

          if ! grep -R "$VITE_PIXABAY_API_KEY" dist > /dev/null; then
            echo "VITE_PIXABAY_API_KEY was not embedded into dist"
            exit 1
          fi

          echo "Build is OK"
          find dist -maxdepth 3 -type f -print

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true
          commit-message: Deploy ${{ github.sha }}